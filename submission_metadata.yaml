methodology_summary: >
  ARIA (Adaptive Ranked Intelligence Architecture) ranks candidates by combining
  five complementary signals rather than relying on keyword matching alone.
  A semantic scorer computes cosine similarity between candidate embeddings and
  structured JD sections using all-MiniLM-L6-v2. A skill graph scorer uses
  PMI-weighted co-occurrence graphs to surface candidates with adjacent expertise
  even when exact JD keywords are absent. A structural scorer directly reads
  career history text to detect production deployment evidence, location fit,
  experience band alignment, and explicit disqualifiers such as consulting-only
  careers or LangChain-wrapper-only AI experience. A behavioral scorer clusters
  23 platform signals into five normalized dimensions. An integrity scorer applies
  a soft multiplicative penalty for honeypot-style anomalies. Final scores fuse
  these signals with structural evidence weighted highest (0.45) to compensate
  for embedding limitations on a CPU-only pipeline. The full 100K ranking
  completes in under 42 seconds on CPU with zero honeypot flags in the top 100.
